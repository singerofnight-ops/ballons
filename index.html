<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Слоговой Тренажер: Весенний Лес</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ГЛОБАЛЬНЫЙ СПИСОК СЛОГОВ (Строго из документа и скриншотов) ---
        const docSyllables = [
            'МА', 'МО', 'МУ', 'МЫ', 'МИ', 'АМ', 'ОМ', 'УМ',
            'СА', 'СО', 'СУ', 'СЫ', 'СИ', 'АС', 'ОС', 'УС',
            'ХА', 'ХО', 'ХУ', 'АХ', 'ОХ', 'УХ',
            'РА', 'РО', 'РУ', 'РЫ', 'РИ', 'АР', 'ОР', 'УР',
            'ША', 'ШО', 'ШУ', 'ШИ', 'АШ', 'ОШ', 'УШ',
            'ЛА', 'ЛО', 'ЛУ', 'ЛЫ', 'ЛИ', 'АЛ', 'ОЛ', 'УЛ',
            'НА', 'НО', 'НУ', 'НЫ', 'НИ', 'АН', 'ОН', 'УН',
            'КА', 'КО', 'КУ', 'КЫ', 'КИ', 'АК', 'ОК', 'УК',
            'ТА', 'ТО', 'ТУ', 'ТЫ', 'ТИ', 'АТ', 'ОТ', 'УТ',
            'ПА', 'ПО', 'ПУ', 'ПЫ', 'ПИ', 'АП', 'ОП', 'УП',
            'ЗА', 'ЗО', 'ЗУ', 'ЗЫ', 'ЗИ', 'АЗ', 'ОЗ', 'УЗ',
            'ГА', 'ГО', 'ГУ', 'ГИ', 'АГ', 'ОГ', 'УГ',
            'ВА', 'ВО', 'ВУ', 'ВЫ', 'ВИ', 'АВ', 'ОВ', 'УВ',
            'ДА', 'ДО', 'ДУ', 'ДЫ', 'ДИ', 'АД', 'ОД', 'УД',
            'БА', 'БО', 'БУ', 'БЫ', 'БИ', 'АБ', 'ОБ', 'УБ',
            'ЖА', 'ЖО', 'ЖУ', 'ЖИ', 'АЖ', 'ОЖ', 'УЖ',
            'ЦА', 'ЦО', 'ЦУ', 'ЦЫ', 'ЦЕ',
            'ЩА', 'ЩУ', 'ЩИ', 'ЩЕ', 'ЩЁ',
            'ФА', 'ФО', 'ФУ', 'ФЫ', 'ФИ', 'ФЁ',
            'ЧА', 'ЧУ', 'ЧИ', 'ЧЕ', 'БЭ', 'ТЁ', 'ДЯ', 'НЫ', 'ЛУ', 'КО', 'ЖИ', 'ШИ'
        ];

        // --- ИКОНКИ ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Maximize = (p) => <IconWrapper {...p}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></IconWrapper>;
        const Minimize = (p) => <IconWrapper {...p}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></IconWrapper>;
        const Printer = (p) => <IconWrapper {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconWrapper>;
        const Edit2 = (p) => <IconWrapper {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconWrapper>;
        const Check = (p) => <IconWrapper {...p}><polyline points="20 6 9 17 4 12"/></IconWrapper>;
        const Car = (p) => <IconWrapper {...p}><path d="M14 16H9m10 0h3v-3.15a1 1 0 00-.84-.99L16 11l-2.7-3.6a2 2 0 00-1.6-.8H9a2 2 0 00-2 2v2L3 11.4a2 2 0 00-1.4.6L1 13.5V16h3m10 0a2 2 0 11-4 0m4 0a2 2 0 10-4 0m-10 0a2 2 0 11-4 0m4 0a2 2 0 10-4 0"/></IconWrapper>;
        const Plane = (p) => <IconWrapper {...p}><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21.5 4c0 0-2 .5-3.5 2L14.5 9.5 6.3 7.7c-.5-.1-.9.1-1.1.5l-1.5 3.1c-.2.4 0 .9.4 1.1L9 15l-3.5 3.5-2.2-.4c-.4-.1-.8.1-1 .4L1 20l5.5 1.5L8 23l1.5-1.3c.3-.2.5-.6.4-1l-.4-2.2L13 15l2.6 4.9c.2.4.7.6 1.1.4l3.1-1.5c.4-.2.6-.6.5-1.1z"/></IconWrapper>;
        const Rocket = (p) => <IconWrapper {...p}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 00-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 012-3.95A12.88 12.88 0 0122 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 01-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></IconWrapper>;
        const Star = (p) => <IconWrapper {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
        const ArrowUp = (p) => <IconWrapper {...p}><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></IconWrapper>;
        const ArrowDown = (p) => <IconWrapper {...p}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></IconWrapper>;
        const Home = (p) => <IconWrapper {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const LeafIcon = (p) => <IconWrapper {...p}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 22 12 12"/></IconWrapper>;
        const GridIcon = (p) => <IconWrapper {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></IconWrapper>;

        // --- ЗВУКОВЫЕ ЭФФЕКТЫ ---
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.05);
                } else if (type === 'error') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'win') {
                    const playNote = (freq, time) => {
                        const nOsc = ctx.createOscillator();
                        const nGain = ctx.createGain();
                        nOsc.connect(nGain);
                        nGain.connect(ctx.destination);
                        nOsc.type = 'sine';
                        nOsc.frequency.setValueAtTime(freq, ctx.currentTime + time);
                        nGain.gain.setValueAtTime(0, ctx.currentTime + time);
                        nGain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + time + 0.05);
                        nGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + time + 0.4);
                        nOsc.start(ctx.currentTime + time);
                        nOsc.stop(ctx.currentTime + time + 0.4);
                    };
                    playNote(261.63, 0);    
                    playNote(329.63, 0.1);  
                    playNote(392.00, 0.2);  
                    playNote(523.25, 0.35); 
                }
            } catch (e) { console.log("Audio not supported"); }
        };

        const Confetti = () => {
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42a5f5', '#66bb6a'];
            return (
                <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                {Array.from({ length: 80 }).map((_, i) => (
                    <div
                    key={i}
                    className="absolute w-3 h-8 rounded-sm opacity-90"
                    style={{
                        left: `${Math.random() * 100}%`,
                        top: `-50px`,
                        backgroundColor: colors[Math.floor(Math.random() * colors.length)],
                        animation: `confetti-fall ${Math.random() * 3 + 2.5}s linear forwards`,
                        animationDelay: `${Math.random() * 0.5}s`,
                        transform: `rotate(${Math.random() * 360}deg)`
                    }}
                    />
                ))}
                <style>{`@keyframes confetti-fall { to { transform: translateY(110vh) rotate(720deg); } }`}</style>
                </div>
            );
        };

        // --- ЕДИНЫЙ ВЕСЕННИЙ ЛЕСНОЙ ФОН ---
        const ForestBackground = () => (
            <div className="absolute inset-0 z-0 overflow-hidden bg-green-50" style={{ background: 'linear-gradient(to bottom, #dbeafe, #f0fdf4)' }}>
                <div className="absolute top-10 right-20 w-32 h-32 bg-yellow-200 rounded-full opacity-90"></div>
                <div className="absolute top-[10%] left-[5%] w-40 h-16 bg-white rounded-full opacity-80"></div>
                <div className="absolute top-[20%] right-[15%] w-56 h-20 bg-white rounded-full opacity-70"></div>
                <div className="absolute bottom-20 left-[-10%] w-[120%] h-64 bg-green-200 rounded-[100%] opacity-50"></div>
                <div className="absolute left-10 bottom-10 w-48 h-64 z-0 flex flex-col items-center">
                    <div className="w-32 h-32 bg-green-400 rounded-full absolute top-0 -left-6"></div>
                    <div className="w-40 h-40 bg-green-500 rounded-full absolute top-10"></div>
                    <div className="w-32 h-32 bg-green-300 rounded-full absolute top-20 -right-8"></div>
                    <div className="w-8 h-32 bg-amber-800 absolute bottom-0"></div>
                </div>
                <div className="absolute right-10 bottom-10 w-64 h-80 z-0 flex flex-col items-center">
                    <div className="w-48 h-48 bg-lime-400 rounded-full absolute top-0"></div>
                    <div className="w-56 h-56 bg-green-400 rounded-full absolute top-16 -left-12"></div>
                    <div className="w-40 h-40 bg-lime-300 rounded-full absolute top-24 -right-4"></div>
                    <div className="w-10 h-40 bg-amber-800 absolute bottom-0"></div>
                </div>
                <div className="absolute -bottom-16 -left-10 w-[120%] h-48 bg-green-400 rounded-[100%] opacity-95"></div>
            </div>
        );

        // --- ДЛЯ ПЕЧАТИ (РАБОЧИЙ ЛИСТ С 3 ЗАДАНИЯМИ) ---
        const PrintWorksheet = ({ syllables, prefixes }) => {
            const target = syllables[0] || 'МА';
            const S1 = syllables[0] || 'МА';
            const S2 = syllables[1] || 'МО';
            const S3 = syllables[2] || 'МУ';
            const S4 = syllables[3] || 'МЫ';
            const P1 = prefixes[0] || 'С';

            const getValidPrefix = (prefix, syllable) => {
                if (!syllable || !prefix) return prefix;
                const baseConsonant = syllable.charAt(0);
                if (prefix === baseConsonant) {
                    if (prefix === 'С') return 'К';
                    if (prefix === 'Х') return 'Т';
                    return 'С';
                }
                return prefix;
            };

            // 1. Шарики (Обманки из документа)
            const balloons = useMemo(() => {
                const distractors = docSyllables.filter(s => s !== target);
                return Array(10).fill(null).map((_, i) => (i < 4 ? target : distractors[i % distractors.length])).sort(() => Math.random() - 0.5);
            }, [target]);

            // 2. Лабиринт
            const mazeGrid = useMemo(() => {
                const cols = 5, rows = 5;
                const path = new Set();
                let currX = 0, currY = 0;
                path.add(`${currX},${currY}`);
                while (currX < cols - 1 || currY < rows - 1) {
                    let canRight = currX < cols - 1, canDown = currY < rows - 1;
                    if (canRight && canDown) { if (Math.random() > 0.5) currX++; else currY++; }
                    else if (canRight) currX++; else currY++;
                    path.add(`${currX},${currY}`);
                }
                const distractors = docSyllables.filter(s => s !== target);
                const grid = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        grid.push(path.has(`${c},${r}`) ? target : distractors[Math.floor(Math.random() * distractors.length)]);
                    }
                }
                return grid;
            }, [target]);

            // 3. Секретный пароль телефона
            const phoneSequence = useMemo(() => [
                { text: S1, color: '#ef4444', label: 'красный' },
                { text: S3, color: '#3b82f6', label: 'синий' },
                { text: `${getValidPrefix(P1, S1)}${S1}`, color: '#22c55e', label: 'зеленый' },
                { text: S4, color: '#eab308', label: 'желтый' },
                { text: `${getValidPrefix(P1, S4)}${S4}`, color: '#a855f7', label: 'фиолет.' }
            ], [S1, S3, P1, S4]);

            // 12 кнопок телефона
            const phoneButtons = useMemo(() => {
                const targets = phoneSequence.map(s => s.text);
                const localDistractors = [
                    S2, 
                    `${getValidPrefix(P1, S2)}${S2}`, 
                    `${getValidPrefix(P1, S3)}${S3}`, 
                    `${getValidPrefix(prefixes[1] || 'Х', S1)}${S1}`, 
                    `${getValidPrefix(prefixes[1] || 'Х', S2)}${S2}` 
                ];
                // Заполняем остаток слогами из документа
                const allDistractors = [...localDistractors, ...docSyllables].filter(d => !targets.includes(d));
                const btns = [...targets, ...allDistractors.slice(0, 12 - targets.length)];
                return btns.sort(() => Math.random() - 0.5);
            }, [phoneSequence, S2, P1, S3, prefixes]);

            return (
                <div className="print-worksheet text-black font-sans bg-white px-8 py-6">
                    <div className="text-center mb-6 border-b-2 border-black pb-2 w-full">
                        <h1 className="text-3xl font-black uppercase tracking-wider">Учимся читать: Слоги и Слова</h1>
                    </div>

                    {/* Задание 1: Шарики */}
                    <div className="mb-8 w-full">
                        <h2 className="text-xl font-bold mb-4">1. Найди и раскрась все шарики со слогом <span className="underline font-black">{target}</span></h2>
                        <div className="flex flex-wrap justify-between gap-2 px-4">
                            {balloons.map((syllable, idx) => (
                                <div key={idx} className="relative flex flex-col items-center">
                                    <svg width="50" height="70" viewBox="0 0 100 130" fill="none" stroke="black" strokeWidth="4"><ellipse cx="50" cy="55" rx="45" ry="50" /><path d="M45 105 L55 105 L50 115 Z" fill="white" /><path d="M50 115 Q40 125 50 130" strokeWidth="3" fill="none" /></svg>
                                    <span className="absolute top-[24px] text-xl font-black text-black">{syllable}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Разделение на две колонки для Задания 2 и Задания 3 */}
                    <div className="flex gap-8 w-full flex-grow items-start">
                        
                        {/* Задание 2: Лабиринт */}
                        <div className="flex-1 flex flex-col items-center border-r-2 border-dashed border-gray-400 pr-8">
                            <h2 className="text-xl font-bold mb-8 self-start w-full">2. Помоги мышке дойти до дома по слогам <span className="underline font-black">{target}</span></h2>
                            <div className="relative inline-block mt-4">
                                <div className="absolute -top-12 -left-8 text-black">
                                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 11a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2 5 5 0 0 1 10 0z"/><path d="M12 21V13"/><path d="M16 8a3 3 0 0 0-3-3h-2a3 3 0 0 0-3 3"/><path d="M22 17v2a2 2 0 0 1-2 2h-4"/><path d="M2 17v2a2 2 0 0 0 2 2h4"/><circle cx="9" cy="11" r="0.5" fill="currentColor"/><circle cx="15" cy="11" r="0.5" fill="currentColor"/></svg>
                                </div>
                                <div className="grid grid-cols-5 gap-[0.4rem]">
                                    {mazeGrid.map((syllable, i) => (
                                        <div key={i} className="w-12 h-12 rounded-full border-[3px] border-black flex items-center justify-center bg-white"><span className="text-lg font-black">{syllable}</span></div>
                                    ))}
                                </div>
                                <div className="absolute -bottom-12 -right-8 text-black">
                                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                </div>
                            </div>
                        </div>

                        {/* Задание 3: Телефон */}
                        <div className="flex-1 flex flex-col items-center pl-2">
                            <h2 className="text-xl font-bold mb-4 self-start w-full">3. Разблокируй телефон. Закрась кнопки в цвета пароля:</h2>
                            
                            <div className="flex justify-between w-full px-1 mb-6 mt-2">
                                {phoneSequence.map((item, i) => (
                                    <div key={i} className="flex flex-col items-center">
                                        <div className="w-12 h-12 rounded-full border-[3px] flex items-center justify-center" style={{borderColor: item.color, backgroundColor: item.color + '15'}}>
                                            <span className="font-bold text-sm">{item.text}</span>
                                        </div>
                                        <span className="text-[12px] mt-1 font-bold text-gray-700">{item.label}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="w-[240px] h-[350px] border-[5px] border-black rounded-[2.5rem] p-4 flex flex-col items-center bg-gray-50 shadow-sm mx-auto">
                                <div className="w-16 h-2 bg-black rounded-full mb-6 mt-2"></div>
                                <div className="grid grid-cols-3 gap-3 w-full">
                                    {phoneButtons.map((btn, i) => (
                                        <div key={i} className="w-[52px] h-[52px] rounded-full border-[3px] border-black flex items-center justify-center bg-white shadow-sm mx-auto">
                                            <span className="font-black text-[14px]">{btn}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="w-10 h-10 border-[3px] border-black rounded-full mt-auto mb-2 bg-white"></div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        // --- ОСНОВНЫЕ ИГРЫ ---
        
        // 1. Дорожки
        const TracksGame = ({ syllables, triggerAnimation, animations }) => {
            return (
                <div className="w-full px-8 flex flex-col gap-12 bg-white/60 backdrop-blur-sm p-12 rounded-[3rem] shadow-sm border-2 border-white/60">
                    {[0, 1, 2].map((index) => {
                        const distances = [85, 55, 30];
                        const s = (syllables[index] || '').trim();
                        // ИСПРАВЛЕНИЕ: берем строго ПЕРВУЮ букву, чтобы не ехал весь слог
                        const leftL = s.charAt(0) || 'М';
                        const rightL = s.substring(1) || 'А';

                        return (
                            <div key={index} className="flex items-center relative">
                                <div className="flex-shrink-0 z-20">
                                    <div className="w-14 h-14 text-white p-2.5 rounded-full shadow-md z-20 relative bg-blue-400">
                                        {index === 0 && <Car size={36} />}
                                        {index === 1 && <Plane size={36} />}
                                        {index === 2 && <Rocket size={36} />}
                                    </div>
                                </div>
                                <div className="flex-grow flex items-center relative h-28 bg-transparent group cursor-pointer" onClick={() => triggerAnimation(index)}>
                                    <div className="absolute top-1/2 -translate-y-1/2 flex items-center z-0 transition-all ease-linear" style={{ left: animations[index] ? `calc(${distances[index]}% - 70px)` : '100px', width: animations[index] ? '0px' : `calc(${distances[index]}% - 160px)`, transitionDuration: '1.5s', opacity: animations[index] ? 0 : 1 }}>
                                        <div className="w-full h-0 border-t-[6px] border-dashed border-green-500"></div>
                                        <div className="w-0 h-0 border-y-[10px] border-y-transparent border-l-[16px] border-l-green-500 -ml-1"></div>
                                    </div>
                                    <div className={`absolute top-0 bottom-0 z-30 flex items-center justify-center transition-all ease-linear`} style={{ left: animations[index] ? `calc(${distances[index]}% - 70px)` : '20px', transitionDuration: '1.5s' }}>
                                        <div className="w-20 h-20 bg-white rounded-full shadow-md flex items-center justify-center border-4 border-green-200">
                                            <span className={`text-5xl sm:text-6xl font-black text-green-700 tracking-wider transition-transform ${animations[index] ? 'scale-110' : 'group-hover:scale-110'}`}>{leftL}</span>
                                        </div>
                                    </div>
                                    <div className="absolute top-0 bottom-0 z-10 flex items-center justify-center" style={{ left: `${distances[index]}%` }}>
                                        <div className="w-20 h-20 bg-white rounded-full shadow-sm flex items-center justify-center border-4 border-transparent">
                                            <span className="text-5xl sm:text-6xl font-black text-green-700 tracking-wider">{rightL}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // 2. Шарики
        const BalloonGame = ({ syllables }) => {
            const targetSyllables = syllables.slice(0, 4).filter(s => s.length >= 2);
            const distractors = docSyllables.filter(d => !targetSyllables.includes(d));

            const [currentTargetIndex, setCurrentTargetIndex] = useState(0);
            const [levelScore, setLevelScore] = useState(0); 
            const [showConfetti, setShowConfetti] = useState(false);
            const [balloons, setBalloons] = useState([]);
            
            const currentTarget = targetSyllables[currentTargetIndex % targetSyllables.length] || 'МА';

            useEffect(() => {
                const colors = ['bg-pink-400', 'bg-blue-400', 'bg-yellow-400', 'bg-green-400', 'bg-purple-400'];
                const types = Array(15).fill(false);
                for(let i=0; i<5; i++) types[i] = true;
                types.sort(() => Math.random() - 0.5);

                const newBalloons = Array.from({ length: 15 }).map((_, i) => {
                    const col = i % 5, row = Math.floor(i / 5); 
                    const text = types[i] ? currentTarget : distractors[Math.floor(Math.random() * distractors.length)];
                    
                    const finalTopPercent = 35 + row * 15; 
                    const duration = ((120 - finalTopPercent) / 100) * 8; 
                    
                    return {
                        id: Math.random().toString(36).substr(2, 9), text,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        left: `${4 + col * 19}%`, finalTop: `${finalTopPercent}%`,
                        delay: `${row * 0.5 + Math.random() * 0.3}s`, duration: `${duration}s`, bobDelay: `${Math.random() * 2}s`, 
                        state: 'floating' 
                    };
                });
                setBalloons(newBalloons);
            }, [currentTarget]);

            const handleBalloonClick = (id, text) => {
                if (showConfetti) return;
                setBalloons(prev => prev.map(b => {
                    if (b.id !== id) return b;
                    if (text === currentTarget) {
                        playSound('pop');
                        const newScore = levelScore + 1;
                        setLevelScore(newScore);
                        if (newScore === 5) {
                            playSound('win');
                            setShowConfetti(true);
                            setTimeout(() => {
                                setCurrentTargetIndex(prevIndex => prevIndex + 1);
                                setLevelScore(0);
                                setShowConfetti(false);
                            }, 4000); 
                        }
                        return { ...b, state: 'popped' };
                    } else {
                        playSound('error');
                        return { ...b, state: 'error' };
                    }
                }));
                if (text !== currentTarget) {
                    setTimeout(() => { setBalloons(prev => prev.map(b => b.id === id ? { ...b, state: 'floating' } : b)); }, 500);
                }
            };

            return (
                <div className="absolute inset-0 w-full h-full overflow-hidden flex flex-col items-center">
                    {showConfetti && <Confetti />}
                    
                    <div className="absolute top-[80px] left-1/2 -translate-x-1/2 z-40 bg-white/95 backdrop-blur-md px-16 py-4 rounded-b-[40px] shadow-2xl border-4 border-t-0 border-green-300 flex flex-col items-center">
                        <h2 className="text-xl font-bold text-gray-400 uppercase tracking-widest mb-1">Лопни слог:</h2>
                        <div className="text-7xl font-black text-green-700 drop-shadow-md leading-none">{currentTarget}</div>
                        <div className="flex gap-2 mt-3">
                            {[...Array(5)].map((_, i) => <Star key={i} size={32} className={`${i < levelScore ? 'text-yellow-400 fill-yellow-400 drop-shadow-sm scale-110' : 'text-gray-200'} transition-all duration-300`} />)}
                        </div>
                    </div>

                    <div className="absolute inset-0 z-10 pointer-events-none">
                        {balloons.map((balloon) => {
                            if (balloon.state === 'popped') return null;
                            return (
                                <div key={balloon.id} className="absolute pointer-events-auto z-10" style={{ left: balloon.left, top: '120%', '--final-top': balloon.finalTop, animation: `riseUp ${balloon.duration} ${balloon.delay} ease-out forwards` }}>
                                    <div style={{ animation: `bob 3s ${balloon.bobDelay} infinite ease-in-out` }}>
                                        <div onPointerDown={(e) => { e.preventDefault(); handleBalloonClick(balloon.id, balloon.text); }} className={`cursor-pointer w-[16vw] max-w-[110px] h-[19vw] max-h-[130px] rounded-[50%] ${balloon.color} shadow-inner relative flex items-center justify-center transition-transform ${balloon.state === 'error' ? 'animate-[shake_0.5s_ease-in-out]' : 'hover:scale-105'} before:content-[''] before:absolute before:w-[25%] before:h-[30%] before:bg-white/40 before:rounded-[50%] before:top-[12%] before:left-[12%] before:rotate-[-45deg] after:content-[''] after:absolute after:bottom-[-12px] after:left-1/2 after:-translate-x-1/2 after:border-l-[8px] after:border-l-transparent after:border-r-[8px] after:border-r-transparent after:border-b-[14px] after:border-b-current after:text-inherit`} style={{ color: 'inherit' }}>
                                            <span className="text-[5vw] sm:text-4xl lg:text-5xl font-black text-white drop-shadow-lg relative z-10 select-none">{balloon.text}</span>
                                        </div>
                                        <svg className="w-[8vw] max-w-[50px] h-[12vw] max-h-[80px] mt-3 mx-auto opacity-60 pointer-events-none" viewBox="0 0 10 50"><path d="M5,0 Q0,10 5,20 T5,40 T5,50" fill="none" stroke="gray" strokeWidth="1.5" /></svg>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // 3. Домик
        const HouseGame = ({ syllables }) => {
            const [leftFloor, setLeftFloor] = useState(0);
            const [rightFloor, setRightFloor] = useState(0);

            const rightChar = syllables[0]?.slice(0, -1) || 'М';
            const vowels = [syllables[2]?.slice(-1) || 'У', syllables[1]?.slice(-1) || 'О', syllables[0]?.slice(-1) || 'А'];
            const leftChar = 'С';

            const moveLeft = (dir) => setLeftFloor(Math.max(0, Math.min(3, leftFloor + dir)));
            const moveRight = (dir) => setRightFloor(Math.max(0, Math.min(3, rightFloor + dir)));

            return (
                <div className="absolute inset-0 w-full h-full overflow-hidden flex flex-col items-center justify-end pb-8">
                    <div className="relative z-10 flex items-center justify-center gap-2 sm:gap-6 mt-16">
                        <div className="flex flex-col gap-6 mr-2 sm:mr-4">
                            <button onClick={() => moveLeft(1)} disabled={leftFloor === 3} className="w-14 h-16 sm:w-16 sm:h-20 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg hover:bg-blue-400 disabled:opacity-30"><ArrowUp size={40} strokeWidth={3} /></button>
                            <button onClick={() => moveLeft(-1)} disabled={leftFloor === 0} className="w-14 h-16 sm:w-16 sm:h-20 bg-blue-500 rounded-xl flex items-center justify-center text-white shadow-lg hover:bg-blue-400 disabled:opacity-30"><ArrowDown size={40} strokeWidth={3} /></button>
                        </div>
                        <div className="relative w-[280px] sm:w-[340px] flex flex-col items-center">
                            <div className="w-[320px] sm:w-[380px] h-24 sm:h-32 bg-red-600 relative overflow-hidden shadow-md flex justify-center items-end pb-3 sm:pb-4 gap-6 sm:gap-8" style={{ clipPath: 'polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%)', borderBottom: '8px solid #b91c1c' }}>
                                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-100 border-4 border-white rounded-t-full flex items-end shadow-inner"><div className="w-full h-1/2 border-t-4 border-white"></div></div>
                                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-100 border-4 border-white rounded-t-full flex items-end shadow-inner"><div className="w-full h-1/2 border-t-4 border-white"></div></div>
                            </div>
                            <div className="w-full bg-orange-400 border-4 border-orange-500 flex flex-col p-3 sm:p-4 gap-3 sm:gap-4 shadow-xl">
                                {[3, 2, 1].map((floor) => (
                                    <div key={floor} className="flex justify-between items-center w-full px-1 sm:px-2 relative group">
                                        <div className="w-16 h-16 sm:w-20 sm:h-20 bg-blue-50 border-4 border-white flex items-center justify-center shadow-inner relative overflow-hidden">
                                            <div className="absolute top-0 bottom-0 left-1/2 border-l-2 border-white"></div><div className="absolute left-0 right-0 top-1/2 border-t-2 border-white"></div>
                                            {leftFloor === floor && <span className="text-5xl sm:text-6xl font-black text-blue-600 relative z-10 drop-shadow-sm leading-none pt-2">{leftChar}</span>}
                                        </div>
                                        <div className="w-20 h-20 sm:w-24 sm:h-24 bg-white border-4 border-orange-300 shadow-md flex items-center justify-center">
                                            <span className="text-6xl sm:text-7xl font-black text-red-600 drop-shadow-sm leading-none pt-2">{vowels[3 - floor]}</span>
                                        </div>
                                        <div className="w-16 h-16 sm:w-20 sm:h-20 bg-blue-50 border-4 border-white flex items-center justify-center shadow-inner relative overflow-hidden">
                                            <div className="absolute top-0 bottom-0 left-1/2 border-l-2 border-white"></div><div className="absolute left-0 right-0 top-1/2 border-t-2 border-white"></div>
                                            {rightFloor === floor && <span className="text-5xl sm:text-6xl font-black text-green-600 relative z-10 drop-shadow-sm leading-none pt-2">{rightChar}</span>}
                                        </div>
                                    </div>
                                ))}
                                <div className="flex justify-between items-end w-full px-1 sm:px-2 mt-1 sm:mt-2 relative group">
                                    <div className="w-14 h-16 sm:w-16 sm:h-20 bg-blue-100 border-4 border-white rounded-t-full shadow-inner relative"><div className="absolute top-0 bottom-0 left-1/2 border-l-4 border-white"></div><div className="absolute left-0 right-0 top-1/2 border-t-4 border-white"></div></div>
                                    <div className="w-24 h-28 sm:w-28 sm:h-32 bg-amber-700 border-4 border-amber-800 rounded-t-lg relative flex flex-col justify-end items-center pb-2 shadow-inner">
                                        <div className="w-3 h-3 sm:w-4 sm:h-4 rounded-full bg-yellow-400 absolute right-2 top-1/2 shadow-sm"></div>
                                        <div className="flex w-full justify-around px-1 items-end">
                                            <span className={`text-4xl sm:text-5xl font-black text-blue-200 drop-shadow-md leading-none ${leftFloor === 0 ? 'opacity-100' : 'opacity-0'}`}>{leftChar}</span>
                                            <span className={`text-4xl sm:text-5xl font-black text-green-300 drop-shadow-md leading-none ${rightFloor === 0 ? 'opacity-100' : 'opacity-0'}`}>{rightChar}</span>
                                        </div>
                                    </div>
                                    <div className="w-14 h-16 sm:w-16 sm:h-20 bg-blue-100 border-4 border-white rounded-t-full shadow-inner relative"><div className="absolute top-0 bottom-0 left-1/2 border-l-4 border-white"></div><div className="absolute left-0 right-0 top-1/2 border-t-4 border-white"></div></div>
                                </div>
                                <div className="absolute -bottom-4 -left-4 -right-4 h-4 bg-orange-600 rounded-full"></div>
                            </div>
                        </div>
                        <div className="flex flex-col gap-6 ml-2 sm:ml-4">
                            <button onClick={() => moveRight(1)} disabled={rightFloor === 3} className="w-14 h-16 sm:w-16 sm:h-20 bg-green-500 rounded-xl flex items-center justify-center text-white shadow-lg hover:bg-green-400 disabled:opacity-30"><ArrowUp size={40} strokeWidth={3} /></button>
                            <button onClick={() => moveRight(-1)} disabled={rightFloor === 0} className="w-14 h-16 sm:w-16 sm:h-20 bg-green-500 rounded-xl flex items-center justify-center text-white shadow-lg hover:bg-green-400 disabled:opacity-30"><ArrowDown size={40} strokeWidth={3} /></button>
                        </div>
                    </div>
                </div>
            );
        };

        // 4. Листопад
        const LeafGame = ({ syllables }) => {
            const baseSyllable = (syllables[0] || 'МА').trim().toUpperCase();
            const [consIndex, setConsIndex] = useState(0);
            const [isFalling, setIsFalling] = useState(false);
            const [hasLanded, setHasLanded] = useState(true);

            // ИСПРАВЛЕНИЕ: Выбираем различные согласные из полного алфавита, исключая первую букву слога
            const allConsonants = ['Б', 'В', 'Г', 'Д', 'Ж', 'З', 'К', 'Л', 'М', 'Н', 'П', 'Р', 'С', 'Т', 'Ф', 'Х', 'Ц', 'Ч', 'Ш', 'Щ'];
            const firstLetter = baseSyllable.charAt(0);
            const validConsonants = useMemo(() => allConsonants.filter(c => c !== firstLetter), [firstLetter]);
            const currentConsonant = validConsonants[consIndex % validConsonants.length] || 'С';

            const dropNextLeaf = () => {
                if (isFalling) return;
                setHasLanded(false);
                setConsIndex((prev) => (prev + 1));
                setIsFalling(true);
                setTimeout(() => {
                    setIsFalling(false);
                    setHasLanded(true);
                }, 1500);
            };

            return (
                <div className="absolute inset-0 w-full h-full overflow-hidden flex flex-col items-center justify-end pb-0">
                    <div className="relative w-full h-2/3 flex items-end justify-center z-10 pb-16 sm:pb-24">
                        <div className="absolute left-[5%] sm:left-[15%] bottom-16 sm:bottom-20 z-20 cursor-pointer hover:scale-105 transition-transform" onClick={dropNextLeaf} title="Нажми на мишку!">
                            <div className="text-[120px] sm:text-[160px] drop-shadow-xl select-none relative animate-[bob_4s_infinite_ease-in-out]">
                                🐻
                                {!isFalling && hasLanded && (
                                    <div className="absolute -top-6 -right-12 sm:-right-16 bg-white text-xs sm:text-sm font-bold px-3 py-1 rounded-2xl rounded-bl-none shadow-md text-gray-600 whitespace-nowrap animate-bounce">
                                        Нажми на меня!
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="relative flex justify-center items-end w-[250px] sm:w-[350px] h-[150px] sm:h-[180px] z-10">
                            <div className="absolute w-40 h-40 sm:w-48 sm:h-48 bg-green-500 rounded-full bottom-[-20px] shadow-lg"></div>
                            <div className="absolute w-32 h-32 sm:w-40 sm:h-40 bg-green-400 rounded-full bottom-[20px] -left-10 shadow-lg"></div>
                            <div className="absolute w-32 h-32 sm:w-40 sm:h-40 bg-green-600 rounded-full bottom-[10px] -right-10 shadow-lg"></div>
                            <div className="absolute bottom-16 sm:bottom-20 left-1/2 translate-x-[20px] sm:translate-x-[30px] bg-white/95 border-y-4 border-r-4 border-green-300 rounded-r-2xl px-3 sm:px-4 py-1 sm:py-2 shadow-xl z-30">
                                <span className="text-6xl sm:text-7xl font-black text-green-700 leading-none">{baseSyllable}</span>
                            </div>
                            <div className="absolute bottom-16 sm:bottom-20 left-1/2 -translate-x-[50px] sm:-translate-x-[60px] w-[70px] h-[72px] sm:w-[90px] sm:h-[92px] z-40">
                                {(hasLanded || isFalling) && (
                                    <div className={`w-full h-full bg-lime-300 border-y-4 border-l-4 border-green-500 rounded-l-[100%] shadow-lg flex items-center justify-end pr-2 origin-center ${isFalling ? 'animate-[leafFall_1.5s_ease-out_forwards]' : 'animate-[popIn_0.3s_ease-out]'}`}>
                                        <span className={`text-5xl sm:text-6xl font-black text-green-900 drop-shadow-sm`}>{currentConsonant}</span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 5. Таблица-Пузырики
        const GridGame = ({ syllables, prefixes }) => {
            const S1 = syllables[0] || 'МА';
            const S2 = syllables[1] || 'МО';
            const S3 = syllables[2] || 'МУ';
            const S4 = syllables[3] || 'МЫ';
            const P1 = prefixes[0] || 'С';
            const P2 = prefixes[1] || 'Х';

            const getValidPrefix = (prefix, syllable) => {
                if (!syllable || !prefix) return prefix;
                const baseConsonant = syllable.slice(0, 1);
                if (prefix === baseConsonant) {
                    if (prefix === 'С') return 'К';
                    if (prefix === 'Х') return 'Т';
                    return 'С';
                }
                return prefix;
            };

            const initialGrid = useMemo(() => [
                { text: `${S1}`, color: '#fb923c' },
                { text: `${getValidPrefix(P1, S1)}${S1}`, color: '#a3e635' },
                { text: `${S2}`, color: '#9ca3af' },
                { text: `${getValidPrefix(P1, S2)}${S2}`, color: '#fb923c' },
                { text: `${S3}`, color: '#f472b6' },
                { text: `${getValidPrefix(P1, S3)}${S3}`, color: '#60a5fa' },
                { text: `${S4}`, color: '#a3e635' },
                { text: `${getValidPrefix(P1, S4)}${S4}`, color: '#f472b6' },
                { text: `${S1}`, color: '#fb923c' },
                { text: `${getValidPrefix(P2, S1)}${S1}`, color: '#f87171' },
                { text: `${S2}`, color: '#9ca3af' },
                { text: `${getValidPrefix(P2, S2)}${S2}`, color: '#f87171' },
                { text: `${S3}`, color: '#9ca3af' },
                { text: `${getValidPrefix(P2, S3)}${S3}`, color: '#a3e635' },
                { text: `${S4}`, color: '#60a5fa' },
                { text: `${getValidPrefix(P2, S4)}${S4}`, color: '#a3e635' }
            ].map(item => ({ ...item, popped: false })), [S1, S2, S3, S4, P1, P2]);

            const [grid, setGrid] = useState(initialGrid);
            useEffect(() => { setGrid(initialGrid); }, [initialGrid]);

            const handlePop = (index) => {
                if (grid[index].popped) return;
                playSound('pop');
                const newGrid = [...grid];
                newGrid[index].popped = true;
                setGrid(newGrid);
            };

            return (
                <div className="absolute inset-0 flex items-center justify-center z-20 pt-16 pb-4">
                    <div className="bg-white/85 backdrop-blur-md p-6 sm:p-10 rounded-[3rem] shadow-xl border-4 border-green-100 max-w-5xl w-full">
                        <div className="grid grid-cols-4 gap-x-4 sm:gap-x-12 gap-y-6 sm:gap-y-8 text-center">
                            {grid.map((item, i) => (
                                <div key={i} className="flex flex-col items-center gap-3 cursor-pointer group" onClick={() => handlePop(i)}>
                                    <span className={`text-3xl sm:text-5xl font-black drop-shadow-sm h-12 flex items-center transition-colors duration-300 ${item.popped ? 'text-gray-400' : 'text-gray-800'}`}>
                                        {item.text}
                                    </span>
                                    <div 
                                        className="w-16 h-16 sm:w-20 sm:h-20 rounded-full transition-all duration-300"
                                        style={{
                                            background: item.popped ? '#d1d5db' : `radial-gradient(circle at 35% 35%, #ffffff 0%, ${item.color} 40%, ${item.color} 100%)`,
                                            boxShadow: item.popped ? 'inset 4px 4px 10px rgba(0,0,0,0.1)' : '0 8px 15px rgba(0,0,0,0.2), inset -8px -8px 15px rgba(0,0,0,0.1)',
                                            transform: item.popped ? 'scale(0.95)' : 'scale(1)'
                                        }}
                                    ></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- КОРНЕВОЙ КОМПОНЕНТ ---
        const SyllableTrainer = () => {
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [currentPage, setCurrentPage] = useState('learn');
            
            const [syllables, setSyllables] = useState(['МА', 'МО', 'МУ', 'МЫ']);
            const [prefixes, setPrefixes] = useState(['С', 'Х']);
            const [animations, setAnimations] = useState({ 0: false, 1: false, 2: false });

            const triggerAnimation = (id) => setAnimations(prev => ({ ...prev, [id]: !prev[id] }));

            const updateSyllable = (index, value) => {
                const newSyllables = [...syllables];
                newSyllables[index] = value.toUpperCase().slice(0, 3) || '';
                setSyllables(newSyllables);
            };

            const updatePrefix = (index, value) => {
                const newPrefixes = [...prefixes];
                newPrefixes[index] = value.toUpperCase().slice(0, 1) || '';
                setPrefixes(newPrefixes);
            };

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(err => console.log(err)); setIsFullscreen(true); }
                else { document.exitFullscreen(); setIsFullscreen(false); }
            };

            useEffect(() => {
                const handleFullscreenChange = () => setIsFullscreen(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullscreenChange);
            }, []);

            return (
                <div className="min-h-screen font-sans selection:bg-green-200 overflow-hidden relative bg-green-50">
                    <style>{`
                        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
                        body { font-family: 'Nunito', sans-serif; }
                        
                        /* ВАЖНО: Правила для печати без display: none */
                        .print-worksheet { display: none; }
                        @media print {
                            @page { size: A4 portrait; margin: 10mm; }
                            body { background: white !important; margin: 0; padding: 0; }
                            .print-hidden { display: none !important; }
                            .print-worksheet { display: flex !important; flex-direction: column; width: 100%; min-height: 100vh; background: white; color: black; }
                        }

                        @keyframes float {
                        0% { transform: translateX(-50px); }
                        50% { transform: translateX(50px); }
                        100% { transform: translateX(-50px); }
                        }
                        @keyframes riseUp {
                        from { top: 120%; }
                        to { top: var(--final-top); }
                        }
                        @keyframes bob {
                        0%, 100% { transform: translateY(0) rotate(-2deg); }
                        50% { transform: translateY(-8px) rotate(2deg); }
                        }
                        @keyframes popIn {
                        0% { transform: scale(0.5) translate(-50%, -50%); opacity: 0; }
                        70% { transform: scale(1.1) translate(-45%, -45%); opacity: 1; }
                        100% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
                        }
                        @keyframes leafFall {
                        0% { transform: translate(40vw, -60vh) rotate(-45deg); opacity: 0; }
                        10% { opacity: 1; }
                        30% { transform: translate(20vw, -30vh) rotate(30deg); }
                        60% { transform: translate(10vw, -15vh) rotate(-20deg); }
                        100% { transform: translate(0, 0) rotate(15deg); opacity: 1; }
                        }
                    `}</style>

                    {/* Версия для печати */}
                    <PrintWorksheet syllables={syllables} prefixes={prefixes} />

                    <div className="print-hidden w-full h-full relative">
                        <ForestBackground />

                        <div className="absolute top-4 left-4 right-4 flex justify-between items-center z-50 px-6 py-3">
                            <button onClick={() => window.print()} className="flex items-center gap-2 px-6 py-3 bg-white/90 border-4 border-green-200 rounded-full shadow-lg text-green-700 hover:bg-green-50 transition-all hover:scale-105">
                                <Printer size={24} />
                                <span className="font-black text-xl">ПЕЧАТЬ</span>
                            </button>

                            <div className="flex gap-2 flex-wrap justify-end bg-white/80 backdrop-blur-md p-2 rounded-full shadow-xl border-2 border-white">
                                <button onClick={() => setCurrentPage('learn')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-black text-sm transition-all ${currentPage === 'learn' ? 'bg-pink-400 text-white shadow-md' : 'text-gray-500 hover:bg-white'}`}>
                                    <Car size={20} className="hidden xl:block"/> <span className="hidden md:block">ДОРОЖКИ</span><span className="md:hidden">1</span>
                                </button>
                                <button onClick={() => setCurrentPage('game')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-black text-sm transition-all ${currentPage === 'game' ? 'bg-blue-400 text-white shadow-md' : 'text-gray-500 hover:bg-white'}`}>
                                    <Star size={20} className="hidden xl:block"/> <span className="hidden md:block">ШАРИКИ</span><span className="md:hidden">2</span>
                                </button>
                                <button onClick={() => setCurrentPage('house')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-black text-sm transition-all ${currentPage === 'house' ? 'bg-orange-500 text-white shadow-md' : 'text-gray-500 hover:bg-white'}`}>
                                    <Home size={20} className="hidden xl:block"/> <span className="hidden md:block">ДОМИК</span><span className="md:hidden">3</span>
                                </button>
                                <button onClick={() => setCurrentPage('spring')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-black text-sm transition-all ${currentPage === 'spring' ? 'bg-green-500 text-white shadow-md' : 'text-gray-500 hover:bg-white'}`}>
                                    <LeafIcon size={20} className="hidden xl:block"/> <span className="hidden md:block">ВЕСНА</span><span className="md:hidden">4</span>
                                </button>
                                <button onClick={() => setCurrentPage('grid')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-black text-sm transition-all ${currentPage === 'grid' ? 'bg-emerald-600 text-white shadow-md' : 'text-gray-500 hover:bg-white'}`}>
                                    <GridIcon size={20} className="hidden xl:block"/> <span className="hidden md:block">ПУЗЫРИКИ</span><span className="md:hidden">5</span>
                                </button>
                                <button onClick={toggleFullscreen} className="p-2 ml-2 bg-gray-100 rounded-full shadow-inner text-gray-500 hover:text-gray-800 transition-colors">
                                    {isFullscreen ? <Minimize size={20} /> : <Maximize size={20} />}
                                </button>
                            </div>
                        </div>

                        <div className="pt-24 h-screen flex flex-col items-center justify-center relative z-10">
                            {currentPage === 'learn' && (
                                <div className="w-full max-w-5xl flex flex-col items-center">
                                    <div className="flex flex-col sm:flex-row gap-4 bg-white/85 backdrop-blur-md p-6 rounded-[2rem] shadow-xl border-4 border-green-200 mb-8 w-full max-w-4xl justify-center items-center">
                                        <div className="flex items-center gap-2">
                                            <span className="font-bold text-gray-600 mr-2 text-lg">Слоги:</span>
                                            {[0, 1, 2, 3].map(i => (
                                                <input key={i} value={syllables[i]} onChange={(e) => updateSyllable(i, e.target.value)} className="w-14 h-14 sm:w-16 sm:h-16 text-xl sm:text-2xl font-black text-center border-[3px] border-green-400 rounded-xl text-green-700 outline-none focus:border-green-600 shadow-inner uppercase" maxLength={3} />
                                            ))}
                                        </div>
                                        <div className="hidden sm:block w-1 h-12 bg-gray-300 mx-2"></div>
                                        <div className="flex items-center gap-2 mt-4 sm:mt-0">
                                            <span className="font-bold text-gray-600 mr-2 text-lg">Буквы (4 и 5 стр):</span>
                                            {[0, 1].map(i => (
                                                <input key={i} value={prefixes[i]} onChange={(e) => updatePrefix(i, e.target.value)} className="w-14 h-14 sm:w-16 sm:h-16 text-xl sm:text-2xl font-black text-center border-[3px] border-orange-400 rounded-xl text-orange-700 outline-none focus:border-orange-600 shadow-inner uppercase" maxLength={1} />
                                            ))}
                                        </div>
                                    </div>
                                    <TracksGame syllables={syllables} triggerAnimation={triggerAnimation} animations={animations} />
                                </div>
                            )}
                            {currentPage === 'game' && <BalloonGame syllables={syllables} />}
                            {currentPage === 'house' && <HouseGame syllables={syllables} />}
                            {currentPage === 'spring' && <LeafGame syllables={syllables} prefixes={prefixes} />}
                            {currentPage === 'grid' && <GridGame syllables={syllables} prefixes={prefixes} />}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SyllableTrainer />);
    </script>
</body>
</html>
